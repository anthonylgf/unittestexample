name: Liquibase RDS Rollback

on:
  push:
    branches:
      - liquibase
  workflow_dispatch:

jobs:
  rollback-last:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Liquibase Rollback
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.db-username }}
          DB_PASSWORD: ${{ secrets.db-password }}
          CHANGELOG_PATH: "src/main/resources/db/changelog.yaml"
        run: |
          chmod +x mvnw
          ./mvnw liquibase:rollback \
            -Dliquibase.url="${{ secrets.DB_URL }}" \
            -Dliquibase.username="${{ secrets.DB_USERNAME }}" \
            -Dliquibase.password="${{ secrets.DB_PASSWORD }}" \
            -Dliquibase.changeLogFile="src/main/resources/db/changelog.yaml" \
            -Dliquibase.rollbackCount=1
