## Database Configuration ##
spring.datasource.url=${DB_URL}
spring.datasource.username=${db-username}
spring.datasource.password=${db-password}

spring.kafka.bootstrap-servers=${kafka-bootstrap-servers}
spring.kafka.producer.bootstrap-servers=${kafka-bootstrap-servers}

## Configuracao do Redis ##
spring.data.redis.host=${redis-host}
spring.data.redis.port=${redis-port}
spring.data.redis.password=${redis-password}
spring.cache.type = redis

spring.config.import=aws-secretsmanager:kafka-bootstrap-servers,aws-secretsmanager:db-username,aws-secretsmanager:DB-URL
